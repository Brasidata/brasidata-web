{{ super() }}

{% set light_favicon = "assets/images/logo-light.png" %}
{% set dark_favicon = "assets/images/favicon-dark.png" %}

<link rel="icon" href="{{ light_favicon | url }}" id="bd-favicon" />
<script>
  (function () {
    var lightHref = "{{ light_favicon | url }}";
    var darkHref = "{{ dark_favicon | url }}";

    function applyFavicon() {
      var scheme =
        document.documentElement.getAttribute("data-md-color-scheme") ||
        document.body.getAttribute("data-md-color-scheme");
      var href = scheme === "slate" ? darkHref : lightHref;
      var link = document.getElementById("bd-favicon");
      if (!link) return;
      if (link.getAttribute("href") !== href) link.setAttribute("href", href);
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", applyFavicon);
    } else {
      applyFavicon();
    }

    var observer = new MutationObserver(applyFavicon);
    observer.observe(document.documentElement, {
      attributes: true,
      attributeFilter: ["data-md-color-scheme"],
    });
    observer.observe(document.body, {
      attributes: true,
      attributeFilter: ["data-md-color-scheme"],
    });
  })();
</script>

<script>
  (function () {
    var globeSvg =
      '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2m6.92 6h-2.95a15.8 15.8 0 0 0-1.42-3.37A8.02 8.02 0 0 1 18.92 8M12 4c.88 1.28 1.58 2.64 2.06 4H9.94C10.42 6.64 11.12 5.28 12 4M4.26 14A7.8 7.8 0 0 1 4 12c0-.69.09-1.36.26-2h3.38c-.08.66-.14 1.33-.14 2s.06 1.34.14 2zm1.82 4h2.95c.41 1.18.9 2.33 1.42 3.37A8.02 8.02 0 0 1 6.08 18M9.03 8H6.08a8.02 8.02 0 0 1 4.37-3.37A15.8 15.8 0 0 0 9.03 8m0 10c.48 1.36 1.18 2.72 2.97 4-.88-1.28-1.58-2.64-2.06-4zm1.03-2h3.88c.08-.66.14-1.33.14-2s-.06-1.34-.14-2H10.06c-.08.66-.14 1.33-.14 2s.06 1.34.14 2m4.91 2h2.95a8.02 8.02 0 0 1-4.37 3.37c.52-1.04 1.01-2.19 1.42-3.37M16.97 16c.08-.66.14-1.33.14-2s-.06-1.34-.14-2h3.38c.17.64.26 1.31.26 2s-.09 1.36-.26 2zM15.97 10H8.03c-.1.66-.17 1.33-.17 2s.07 1.34.17 2h7.94c.1-.66.17-1.33.17-2s-.07-1.34-.17-2"/></svg>';

    function getLanguage() {
      var lang = (document.documentElement.getAttribute("lang") || "en").toLowerCase();
      return lang.startsWith("pt") ? "pt" : lang.startsWith("es") ? "es" : "en";
    }

    function getCtaConfig(lang) {
      if (lang === "pt") {
        return {
          talkText: "Fale conosco",
          servicesText: "Ver serviços",
          servicesHref: "#servicos",
          waHref:
            "https://api.whatsapp.com/send/?phone=5524981796934&text=Ol%C3%A1%2C+vim+do+site+e+quero+saber+mais%21&type=phone_number&app_absent=0",
        };
      }
      if (lang === "es") {
        return {
          talkText: "Hable con nosotros",
          servicesText: "Ver servicios",
          servicesHref: "#servicios",
          waHref:
            "https://api.whatsapp.com/send/?phone=5524981796934&text=Hola%2C+vengo+del+sitio+y+quiero+saber+m%C3%A1s%21&type=phone_number&app_absent=0",
        };
      }
      return {
        talkText: "Talk to us",
        servicesText: "View services",
        servicesHref: "#services",
        waHref:
          "https://api.whatsapp.com/send/?phone=5524981796934&text=Hello%2C+I+came+from+the+website+and+want+to+learn+more%21&type=phone_number&app_absent=0",
      };
    }

    function ensureHeaderLayout() {
      var headerInner = document.querySelector(".md-header__inner");
      if (!headerInner) return;
      if (headerInner.querySelector(".bd-header-right")) return;

      var palette = headerInner.querySelector('form[data-md-component="palette"]');
      var langOption = headerInner.querySelector(".md-header__option .md-select");
      var langWrapper = langOption ? langOption.closest(".md-header__option") : null;

      var right = document.createElement("div");
      right.className = "bd-header-right";

      var lang = getLanguage();
      var cfg = getCtaConfig(lang);

      var ctas = document.createElement("div");
      ctas.className = "bd-header-ctas";

      var talk = document.createElement("a");
      talk.className = "bd-header-cta bd-header-cta--primary";
      talk.href = cfg.waHref;
      talk.target = "_blank";
      talk.rel = "noopener";
      talk.textContent = cfg.talkText;

      var services = document.createElement("a");
      services.className = "bd-header-cta";
      services.href = cfg.servicesHref;
      services.textContent = cfg.servicesText;

      ctas.appendChild(talk);
      ctas.appendChild(services);

      right.appendChild(ctas);
      if (palette) right.appendChild(palette);
      if (langWrapper) right.appendChild(langWrapper);
      headerInner.appendChild(right);

      if (langWrapper) {
        var langBtn = langWrapper.querySelector('button[aria-label="Select language"]');
        if (langBtn) langBtn.innerHTML = globeSvg;
      }

      var waFloat = document.querySelector(".bd-wa-float");
      if (waFloat) waFloat.setAttribute("href", cfg.waHref);
    }

    function onRouteChange() {
      var lang = getLanguage();
      var cfg = getCtaConfig(lang);
      var talk = document.querySelector(".bd-header-cta--primary");
      var services = document.querySelector(".bd-header-ctas .bd-header-cta:not(.bd-header-cta--primary)");
      if (talk) {
        talk.textContent = cfg.talkText;
        talk.setAttribute("href", cfg.waHref);
      }
      if (services) {
        services.textContent = cfg.servicesText;
        services.setAttribute("href", cfg.servicesHref);
      }
      var waFloat = document.querySelector(".bd-wa-float");
      if (waFloat) waFloat.setAttribute("href", cfg.waHref);
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", ensureHeaderLayout);
    } else {
      ensureHeaderLayout();
    }

    window.addEventListener("popstate", onRouteChange);
    window.addEventListener("hashchange", onRouteChange);

    var observer = new MutationObserver(function () {
      ensureHeaderLayout();
    });
    observer.observe(document.documentElement, { childList: true, subtree: true });
  })();
</script>
