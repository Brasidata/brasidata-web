site_name: Brasidata
site_description: Data governance for construction companies and AI-ready operations
site_author: Elias M. P. Junior
site_url: https://brasidata.com/

docs_dir: content
site_dir: ../site

theme:
  name: material
  language: en
  custom_dir: overrides
  logo: assets/images/logo-text-light.png
  favicon: assets/images/logo-light.png
  icon:
    alternate: material/web
  font:
    text: Poppins
    code: Roboto Mono
  palette:
    - scheme: default
      primary: green
      accent: lime
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: green
      accent: lime
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

  features:
    - navigation.top

plugins:
  - macros
  - i18n:
      docs_structure: folder
      fallback_to_default: true
      reconfigure_material: true
      languages:
        - locale: en
          name: English
          default: true
          build: true
        - locale: pt
          name: Português
          build: true
          nav_translations:
            Home: Início
        - locale: es
          name: Español
          build: true
          nav_translations:
            Home: Inicio

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - md_in_html
  - tables
  - pymdownx.details
  - pymdownx.inlinehilite
  - pymdownx.magiclink
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji

extra_css:
  - assets/stylesheets/extra.css?v=10

extra:
  alternate:
    - name: English
      link: /
      lang: en
    - name: Português
      link: /pt/
      lang: pt
    - name: Español
      link: /es/
      lang: es

nav:
  - Home: index.md
